{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 pt-5 d-flex justify-content-center" style="min-height: calc(100vh - 150px);">
    <div class="card border-0 shadow-lg p-5 text-center" style="background: rgba(0, 15, 40, 0.8); backdrop-filter: blur(10px); border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1) !important;">
        <div class="mb-4">
            <div class="rounded-circle bg-primary d-inline-flex align-items-center justify-content-center text-white fw-bold shadow" style="width: 100px; height: 100px; font-size: 2.5rem;">
                {{ user.prenom[0] }}{{ user.nom[0] }}
            </div>
        </div>
        <h2 class="text-white fw-bold mb-1">{{ user.prenom }} {{ user.nom }}</h2>
        <p class="text-muted fs-5 mb-4">@{{ user.pseudo }}</p>
        
        <div class="d-flex justify-content-between align-items-center bg-dark p-3 rounded-3 mb-3 border border-secondary">
            <span class="text-light">Email</span>
            <span class="text-white fw-bold">{{ user.email }}</span>
        </div>
        <div class="d-flex justify-content-between align-items-center bg-dark p-3 rounded-3 border border-secondary">
            <span class="text-light">Points Totaux</span>
            <span class="badge bg-success fs-5 px-3 py-2">{{ user.points_totaux }} PTS</span>
        </div>
    </div>
</div>
{% endblock %}
