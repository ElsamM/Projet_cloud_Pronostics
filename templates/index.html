{% extends 'base.html' %}
{% block content %}

<video autoplay loop muted playsinline style="position: fixed; top: 0; left: 0; min-width: 100%; min-height: 100%; z-index: -2; object-fit: cover;">
    <source src="{{ url_for('static', filename='video/trailler.mp4') }}" type="video/mp4">
</video>

<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: -1;"></div>

<div class="container d-flex flex-column justify-content-end pb-5" style="min-height: calc(100vh - 90px);">
    
    <div style="max-width: 600px; margin-bottom: 40px;">
        <h1 class="fw-bold text-white mb-3" style="font-size: 3.5rem; letter-spacing: -1px; line-height: 1.1;">Vivez la Coupe du Monde.</h1>
        <p class="text-light mb-5" style="font-size: 1.2rem; opacity: 0.9;">Rejoignez la ligue ESME, pronostiquez les matchs et hissez-vous au sommet du classement général.</p>
        
        <div class="d-flex gap-3">
            <a href="/register" class="btn fw-bold px-4 py-3 rounded-pill" style="background-color: #ed2939; color: white; border: none; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(237, 41, 57, 0.4); transition: 0.3s;">
                S'inscrire
            </a>
            <a href="/login" class="btn fw-bold px-4 py-3 rounded-pill bg-transparent text-white" style="border: 2px solid white; font-size: 1.1rem; transition: 0.3s;">
                Connexion
            </a>
        </div>
    </div>

</div>

{% endblock %}
