{% extends 'base.html' %}
{% block content %}

<style>
    .hero-bg {
        /* Le linear-gradient ajoute un filtre sombre pour que le texte reste lisible sur l'image */
        background-image: linear-gradient(rgba(11, 12, 16, 0.8), rgba(11, 12, 16, 0.8)), url("{{ url_for('static', filename='img/image_bg.jpg') }}");
        background-size: cover;
        background-position: center;
        min-height: calc(100vh - 90px);
        display: flex;
        align-items: center;
        /* Le justify-content a été retiré ici car on le gère dans le container en dessous */
    }
</style>

<div class="hero-bg">
    <div class="container d-flex flex-column justify-content-end pb-5" style="min-height: calc(100vh - 90px);">
        
        <div style="max-width: 600px; margin-bottom: 40px;">
            <h1 class="fw-bold text-white mb-3" style="font-size: 3.5rem; letter-spacing: -1px; line-height: 1.1;">Vivez la Coupe du Monde.</h1>
            <p class="text-light mb-5" style="font-size: 1.2rem; opacity: 0.9;">Rejoignez la ligue CFTC, pronostiquez les matchs et hissez-vous au sommet du classement général.</p>
            
            <div class="d-flex gap-3">
                <a href="/register" class="btn fw-bold px-4 py-3 rounded-pill" style="background-color: #1e3a8a; color: white; border: none; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(30, 58, 138, 0.4); transition: 0.3s;">
                    S'inscrire
                </a>
                <a href="/login" class="btn fw-bold px-4 py-3 rounded-pill bg-transparent text-white" style="border: 2px solid white; font-size: 1.1rem; transition: 0.3s;">
                    Connexion
                </a>
            </div>
        </div>

    </div>
</div>

{% endblock %}
